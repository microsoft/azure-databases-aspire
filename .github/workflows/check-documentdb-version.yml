name: Check DocumentDB Versions

# Detects new upstream `documentdb/documentdb` releases and opens a PR that adds them to the
# curated supported-versions list in `src/Aspire.Hosting.DocumentDB/DocumentDBVersion.cs`.
#
# How a typical run lands:
#   1. eng/scripts/check-documentdb-versions.py rewrites DocumentDBVersion.cs and the
#      auto-generated block in CHANGELOG.md (replace-in-place).
#   2. The workflow commits and pushes to the `auto/documentdb-versions-update` branch,
#      then prints a link for the maintainer to open the PR.
#   3. CI on that PR will FAIL because the public API analyzer baseline at
#      src/Aspire.Hosting.DocumentDB/api/Aspire.Hosting.DocumentDB.cs has not been updated.
#      THIS IS BY DESIGN: the maintainer reviewing the PR appends the new
#      DocumentDBVersion.V0_X_Y enum members to that file by hand and pushes a follow-up
#      commit. This preserves the analyzer as an independent guard against unintentional
#      public API changes.
#
# PR creation: The microsoft org restricts GITHUB_TOKEN from creating PRs, so
# this workflow pushes the branch and prints a link for the maintainer to open
# the PR manually (one click). This avoids needing PATs or GitHub Apps.
#
# Trust assumption: GHCR tags are mutable. "Version supported" here means "tag exists at the
# time of the check", not "image bytes are immutable". Pinning by digest is a future
# enhancement.

on:
  schedule:
    # Weekly at 06:00 UTC on Mondays.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-documentdb-version
  cancel-in-progress: false

jobs:
  check-and-open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Detect new DocumentDB versions
        id: detect
        env:
          # Authenticated GitHub API requests get a higher rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 eng/scripts/check-documentdb-versions.py

      - name: Show resulting diff
        if: steps.detect.outputs.new_versions != ''
        run: git --no-pager diff

      - name: Push branch and print PR link
        if: steps.detect.outputs.new_versions != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --signoff -m "Auto-update DocumentDB supported versions: ${{ steps.detect.outputs.new_versions }}"
          git push origin HEAD:refs/heads/auto/documentdb-versions-update --force
          echo ""
          echo "=============================================="
          echo "Branch pushed. Create a PR at:"
          echo "https://github.com/microsoft/azure-databases-aspire/compare/main...auto/documentdb-versions-update?expand=1"
          echo "=============================================="
          echo ""
          echo "::notice title=New DocumentDB versions detected::${{ steps.detect.outputs.new_versions }} — create PR at https://github.com/microsoft/azure-databases-aspire/compare/main...auto/documentdb-versions-update?expand=1"
