name: Check DocumentDB Versions

# Detects new upstream `documentdb/documentdb` releases and opens a PR that adds them to the
# curated supported-versions list in `src/Aspire.Hosting.DocumentDB/DocumentDBVersion.cs`.
#
# How a typical run lands:
#   1. eng/scripts/check-documentdb-versions.py rewrites DocumentDBVersion.cs and the
#      auto-generated block in CHANGELOG.md (replace-in-place).
#   2. peter-evans/create-pull-request opens (or updates) the PR on the deterministic branch
#      `auto/documentdb-versions-update`.
#   3. CI on that PR will FAIL because the public API analyzer baseline at
#      src/Aspire.Hosting.DocumentDB/api/Aspire.Hosting.DocumentDB.cs has not been updated.
#      THIS IS BY DESIGN: the maintainer reviewing the PR appends the new
#      DocumentDBVersion.V0_X_Y enum members to that file by hand and pushes a follow-up
#      commit. This preserves the analyzer as an independent guard against unintentional
#      public API changes.
#
# Token note: PRs created by GITHUB_TOKEN do NOT trigger downstream workflow runs by default
# (this is a GitHub Actions safety mechanism). The maintainer's manual baseline-update push
# triggers CI as a side effect, so this is acceptable for the default flow. If you want CI
# to run as soon as the auto-PR opens (useful for quick "are the source edits sane?" feedback),
# create a fine-grained PAT or GitHub App token with `contents:write + pull_requests:write`
# and store it as `secrets.AUTOPR_TOKEN`. The workflow falls back to GITHUB_TOKEN when that
# secret is not set.
#
# Trust assumption: GHCR tags are mutable. "Version supported" here means "tag exists at the
# time of the check", not "image bytes are immutable". Pinning by digest is a future
# enhancement.

on:
  schedule:
    # Weekly at 06:00 UTC on Mondays.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-documentdb-version
  cancel-in-progress: false

jobs:
  check-and-open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect new DocumentDB versions
        id: detect
        env:
          # Authenticated GitHub API requests get a higher rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 eng/scripts/check-documentdb-versions.py

      - name: Show resulting diff
        if: steps.detect.outputs.new_versions != ''
        run: git --no-pager diff

      - name: Open or update pull request
        if: steps.detect.outputs.new_versions != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTOPR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: auto/documentdb-versions-update
          delete-branch: true
          signoff: true
          commit-message: |
            Auto-update DocumentDB supported versions: ${{ steps.detect.outputs.new_versions }}

            Detected new upstream DocumentDB version(s) ${{ steps.detect.outputs.new_versions }}
            via .github/workflows/check-documentdb-version.yml.

            This PR was generated by an automated workflow. The public API analyzer baseline
            at src/Aspire.Hosting.DocumentDB/api/Aspire.Hosting.DocumentDB.cs is intentionally
            NOT auto-edited; the maintainer must append the new DocumentDBVersion.V0_X_Y
            enum members there before merging.
          title: 'chore: add DocumentDB ${{ steps.detect.outputs.new_versions }} to supported versions'
          body: |
            ## Summary

            The `check-documentdb-version` workflow detected the following new upstream
            DocumentDB version(s):

            **New:** `${{ steps.detect.outputs.new_versions }}`
            **All known after this change:** `${{ steps.detect.outputs.all_versions }}`

            A version is added only when:
            - A matching non-draft, non-prerelease GitHub Release exists on
              [`documentdb/documentdb`](https://github.com/documentdb/documentdb/releases), AND
            - All required PG variant tags (`pg15-X.Y.Z`, `pg16-X.Y.Z`, `pg17-X.Y.Z`) are
              published on GHCR.

            ## What changed in this PR

            - `src/Aspire.Hosting.DocumentDB/DocumentDBVersion.cs` — appended new enum members
              and string constants. Existing numeric enum values are preserved.
            - `CHANGELOG.md` — replace-in-place update of the auto-generated DocumentDB
              versions block.

            ## What the workflow deliberately did NOT change

            - `src/Aspire.Hosting.DocumentDB/api/Aspire.Hosting.DocumentDB.cs` (public API
              analyzer baseline). Auto-editing this file would defeat its purpose as an
              independent guard against unintentional public API changes.

            ## Reviewer checklist

            - [ ] Diff in `DocumentDBVersion.cs` adds only new members; no existing numeric
                  values were renumbered.
            - [ ] Append the new `DocumentDBVersion.V0_X_Y` enum members and matching
                  `public const string V0_X_Y = "X.Y.Z";` lines to
                  `src/Aspire.Hosting.DocumentDB/api/Aspire.Hosting.DocumentDB.cs` between
                  the `<auto-generated-versions-start>` / `<auto-generated-versions-end>`
                  markers, then push.
            - [ ] CI is now green (build + unit + integration).
            - [ ] CHANGELOG entry reads correctly under `[Unreleased]`.

            <sub>Generated by `.github/workflows/check-documentdb-version.yml`.</sub>
