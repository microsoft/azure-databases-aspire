name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore azure-databases-aspire.sln

      - name: Build
        run: dotnet build azure-databases-aspire.sln --no-restore

      - name: Unit Tests
        run: dotnet test tests/Aspire.Hosting.DocumentDB.Tests/Aspire.Hosting.DocumentDB.Tests.csproj --no-build --filter "FullyQualifiedName!~IntegrationTests"

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore azure-databases-aspire.sln

      - name: Build
        run: dotnet build azure-databases-aspire.sln --no-restore

      - name: Integration Tests
        run: dotnet test tests/Aspire.Hosting.DocumentDB.Tests/Aspire.Hosting.DocumentDB.Tests.csproj --no-build --filter "FullyQualifiedName~IntegrationTests"
